// android/build.gradle
buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion    = 24
        compileSdkVersion = 36
        targetSdkVersion  = 36
        ndkVersion        = "27.1.12297006"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.3.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20'
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    compileSdkVersion rootProject.ext.has('compileSdkVersion')
        ? rootProject.ext.compileSdkVersion
        : 36

    ndkVersion rootProject.ext.has('ndkVersion')
        ? rootProject.ext.ndkVersion
        : "27.1.12297006"

    defaultConfig {
        minSdkVersion rootProject.ext.has('minSdkVersion')
            ? rootProject.ext.minSdkVersion
            : 24
        targetSdkVersion rootProject.ext.has('targetSdkVersion')
            ? rootProject.ext.targetSdkVersion
            : 36

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                arguments "-DANDROID_STL=c++_shared", "-DSHARED_DIR=${projectDir}/../shared"
            }
        }

        ndk {
            abiFilters "arm64-v8a", "x86_64", "armeabi-v7a", "x86"
        }
    }

    buildFeatures {
        prefab true
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // OpenCV como AAR con soporte Prefab
    implementation 'org.opencv:opencv:4.12.0'

    // ExifInterface: corrección de orientación EXIF en imágenes de cámara
    implementation 'androidx.exifinterface:exifinterface:1.3.7'

    // React Native — se resuelve desde el proyecto host
    implementation 'com.facebook.react:react-android'
}
